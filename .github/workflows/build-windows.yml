name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          - platform: arm64
            target: aarch64-pc-windows-msvc
            runner: windows-11-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: cd weasel_vision && npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build app
        run: cd weasel_vision && npx tauri build --target ${{ matrix.target }} --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WeaselVision-windows-${{ matrix.platform }}
          path: |
            weasel_vision/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Create Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            weasel_vision/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
